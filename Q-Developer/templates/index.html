<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Task Tracker</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 0 16px; }
    h1 { margin-bottom: 20px; }
    form.add-form { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
    form.add-form input[type="text"] { flex: 1; padding: 8px; }
    form.add-form select, form.add-form button { padding: 8px 12px; }
    ul { list-style: none; padding: 0; }
    li { display: flex; justify-content: space-between; align-items: center;
         padding: 10px 12px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 8px; }
    .badge { background: #4a90e2; color: #fff; border-radius: 12px;
             padding: 2px 10px; font-size: 0.8em; margin-right: 10px; }
    button.remove { background: #e74c3c; color: #fff; border: none;
                    border-radius: 4px; padding: 4px 10px; cursor: pointer; }
    p.empty { color: #888; }
  </style>
</head>
<body>
  <h1>Task Tracker</h1>

  <form class="add-form" action="/add" method="post">
    <input type="text" name="name" placeholder="Task name" required>
    <select name="priority">
      {% for p in range(1, 6) %}
        <option value="{{ p }}">Priority {{ p }}</option>
      {% endfor %}
    </select>
    <button type="submit">Add</button>
  </form>

  {% if tasks %}
  <ul>
    {% for task in tasks %}
    <li>
      <span><span class="badge">{{ task.priority }}</span>{{ task.name }}</span>
      <form action="/remove/{{ loop.index0 }}" method="post" style="margin:0">
        <button class="remove" type="submit">Remove</button>
      </form>
    </li>
    {% endfor %}
  </ul>
  {% else %}
  <p class="empty">No tasks yet. Add one above.</p>
  {% endif %}
</body>
</html>
